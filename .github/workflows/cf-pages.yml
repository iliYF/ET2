name: Deploy to cf-pages

on:
  push:
    branches: [main]
    paths:
      - '_worker.js'
      - 'wrangler.toml'
      - 'pages/**'
      - 'scripts/build-cf-pages.js'
      - '.github/workflows/cf-pages.yml'
  workflow_dispatch:
    inputs:
      custom_page_file:
        description: 'Static page to inject (e.g. pages/custom.html)'
        required: true
        default: 'pages/et.html'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set build version
        id: version
        run: |
          echo "DISPLAY=$(date -u +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          echo "SAFE=$(date -u +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

      - name: Build cf-pages distribution
        run: node scripts/build-cf-pages.js
        env:
          CUSTOM_PAGE_FILE: ${{ github.event.inputs.custom_page_file || 'pages/et.html' }}
          BUILD_VERSION: ${{ steps.version.outputs.DISPLAY }}

      - name: Package distribution
        run: |
          cd dist
          zip -r ../et2-release-v${{ steps.version.outputs.SAFE }}.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.SAFE }}
          name: ET2 v${{ steps.version.outputs.SAFE }}
          body: |
            Build time: ${{ steps.version.outputs.DISPLAY }} (UTC)
            Page: ${{ github.event.inputs.custom_page_file || 'pages/et.html' }}
            Commit: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
          files: et2-release-v${{ steps.version.outputs.SAFE }}.zip
          draft: false
          prerelease: false

      - name: Deploy to cf-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: cf-pages
          publish_dir: ./dist
          # force_orphan: true
          commit_message: 'deploy: ET2 v${{ steps.version.outputs.SAFE }}'
